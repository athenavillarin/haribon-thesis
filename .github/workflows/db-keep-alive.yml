name: Database Keep-Alive

on:
  schedule:
    # Run every 4 minutes to keep Neon database awake
    - cron: '*/4 * * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sqlalchemy psycopg2-binary
      
      - name: Ping database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python << 'EOF'
          import os
          import sys
          from datetime import datetime
          from sqlalchemy import create_engine, text
          
          database_url = os.environ.get("DATABASE_URL")
          if not database_url:
              print("[ERROR] DATABASE_URL not set in secrets")
              sys.exit(1)
          
          try:
              engine = create_engine(database_url, pool_pre_ping=True, connect_args={"connect_timeout": 10})
              with engine.connect() as conn:
                  result = conn.execute(text("SELECT 1"))
                  print(f"[{datetime.now().isoformat()}] ✓ Database ping successful")
                  conn.commit()
          except Exception as e:
              print(f"[{datetime.now().isoformat()}] ✗ Database ping failed: {e}")
              sys.exit(1)
          EOF
      
      - name: Log success
        if: success()
        run: echo "Database keep-alive ping completed successfully at $(date)"
      
      - name: Log failure
        if: failure()
        run: echo "Database keep-alive ping failed - check logs above"
