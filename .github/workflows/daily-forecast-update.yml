name: Daily Forecast Update

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  update-forecasts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
          
      - name: Install Python dependencies
        run: |
          cd product/haribon_system/backend
          pip install -r requirements.txt
          
      - name: Run daily forecast update
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          COPERNICUSMARINE_SERVICE_USERNAME: ${{ secrets.CMEMS_USERNAME }}
          COPERNICUSMARINE_SERVICE_PASSWORD: ${{ secrets.CMEMS_PASSWORD }}
        run: |
          cd product/haribon_system/backend
          python app/scripts/daily_updater.py